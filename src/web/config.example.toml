[llm]
# LLM model name for markdown optimization.
model_name = "qwen3.5-plus"

# OpenAI-compatible endpoint.
base_url = "https://dashscope.aliyuncs.com/compatible-mode/v1"

# Set your key here for local usage. Do not commit real secrets.
api_key = "your_dashscope_api_key"

# Retry only for severe validation failures.
max_retries = 1

# Optional model flag forwarded via extra_body.
enable_thinking = false

[web.history]
# SQLite file used to persist conversion history.
db_path = "cache/web_history.db"

[web.cache]
# HTML cache directory used by converters.
html_dir = "cache/html"

# Delete cached files older than this many days.
retention_days = 90

# Background cleanup interval in hours.
cleanup_interval_hours = 24

